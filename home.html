<!DOCTYPE html>
<html>
<head>
  <title>ResQ AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #f8fbff, #e6f0ff);
      color: black;
      text-align: center;
    }

    /* 🔝 HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 25px;
      background: white;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .logo {
      height: 80px;
    }

    /* ⚙️ SETTINGS */
    .settings {
      position: relative;
      cursor: pointer;
      font-size: 45px;
    }

    .dropdown {
      position: absolute;
      right: 0;
      top: 40px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      display: none;
      overflow: hidden;
      min-width: 140px;
    }

    .dropdown div {
      padding: 12px 15px;
      cursor: pointer;
    }

    .dropdown div:hover {
      background: #f5f5f5;
    }

    /* 🔴 SOS BUTTON */
    .sos-btn {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 6px solid black;
      background: red;
      color: white;
      font-size: 26px;
      font-weight: bold;
      margin-top: 120px;
      cursor: pointer;
      box-shadow: 0 0 25px rgb(150, 47, 47);
      animation: pulse 2.5s infinite;
      transition: 0.3s;
    }

    .sos-btn:hover {
      transform: scale(1.1);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 10px red; }
      50% { box-shadow: 0 0 35px rgb(235, 73, 73); }
      100% { box-shadow: 0 0 10px rgb(251, 13, 13); }
    }

    /* 💬 CHAT BUTTON */
    .chat-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #304f72;
      color: white;
      border-radius: 50%;
      width: 65px;
      height: 65px;
      border: none;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 0 10px #47698e;
    }

    /* 🎤 VOICE BUTTON */
    .voice-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: #2c0a7a;
      color: white;
      border-radius: 50%;
      width: 65px;
      height: 65px;
      border: none;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 0 10px #3e09ed;
    }

    /* 💬 CHAT BOX */
    .chat-container {
      position: fixed;
      bottom: 95px;
      right: 20px;
      width: 320px;
      background: white;
      border-radius: 12px;
      display: none;
      flex-direction: column;
      box-shadow: 0 0 25px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .chat-header {
      background: #007bff;
      color: white;
      padding: 12px;
      font-weight: bold;
    }

    .chat-box {
      height: 260px;
      overflow-y: auto;
      padding: 10px;
      font-size: 14px;
    }

    .msg {
      margin: 6px;
      padding: 9px;
      border-radius: 8px;
      max-width: 75%;
    }

    .user {
      background: #007bff;
      color: white;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #eee;
      margin-right: auto;
      text-align: left;
    }

    .chat-input {
      display: flex;
      border-top: 1px solid #ccc;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    .chat-input button {
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    #status {
      margin-top: 15px;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>

<body>

<!-- 🔝 HEADER -->
<div class="header">
  <img src="logo.png" class="logo">

  <div class="settings" onclick="toggleMenu()">⚙️
    <div class="dropdown" id="menu">
      <div onclick="goProfile()">👤 Profile</div>
      <div onclick="logout()">🚪 Logout</div>
    </div>
  </div>
</div>

<!-- 🔴 SOS -->
<button class="sos-btn" id="emergencyBtn">SOS</button>

<p id="status"></p>

<!-- 💬 CHAT -->
<div class="chat-container" id="chatContainer">
  <div class="chat-header">ResQ AI</div>
  <div class="chat-box" id="chat"></div>

  <div class="chat-input">
    <input id="input" placeholder="Type your issue...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- 💬 CHAT BUTTON -->
<button class="chat-toggle" onclick="toggleChat()">💬</button>

<!-- 🎤 VOICE BUTTON -->
<button class="voice-btn" onclick="startListening()">🎤</button>

<script type="module" src="app.js"></script>

<script type="module">
import { auth } from './firebase.js';
import { signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

window.toggleChat = () => {
  const chat = document.getElementById("chatContainer");
  chat.style.display = chat.style.display === "flex" ? "none" : "flex";
};

window.toggleMenu = () => {
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
};

window.goProfile = () => {
  window.location.href = "profile.html";
};

window.logout = async () => {
  await signOut(auth);
  window.location.href = "index.html";
};
</script>

</body>
</html>
